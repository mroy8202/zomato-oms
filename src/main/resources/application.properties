spring.application.name=zomato-oms

# -----------------------------------------
# Server
# -----------------------------------------
server.port=8080

# -----------------------------------------
# Database
# -----------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/zomato_oms
spring.datasource.username=postgres
spring.datasource.password=Mritunjay@123

# -----------------------------------------
# JPA
# -----------------------------------------
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# -----------------------------------------
# Kafka
# -----------------------------------------
# Broker location (default local Kafka port)
spring.kafka.bootstrap-servers=localhost:9092

# -----------------------------------------
# Producer
# -----------------------------------------
# Serialize keys as Strings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# Serialize values as JSON using Jackson
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Strongest durability: wait for all replicas to acknowledge
spring.kafka.producer.acks=all
# Retry up to 3 times on transient failure
spring.kafka.producer.retries=3

# -----------------------------------------
# Consumer
# -----------------------------------------
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# Consumer group - all instances of this service share one group,
# so each message is processed by exactly ONE instance
spring.kafka.consumer.group-id=zomato-oms-group
# Read from the beginning if no offset is committed yet
spring.kafka.consumer.auto-offset-reset=earliest
# Disable auto-commit - we commit manually after successful processing
spring.kafka.consumer.enable-auto-commit=false
# Tell Jackson deserializer which packages are trusted for deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mritunjay.zomato.oms.kafka.event

# -----------------------------------------
# Topic Names (centralized here to avoid magic strings)
# -----------------------------------------
kafka.topic.order-created=order-created
kafka.topic.payment-success=payment-success